<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Statystyki</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrapper">
    <div class="panel">
        <h1 id="worldName">Ładowanie...</h1>
        <div class="grid">
            <div class="box"><span>Gracze</span><b id="players"></b></div>
            <div class="box"><span>Wioski</span><b id="villages"></b></div>
            <div class="box"><span>Punkty</span><b id="points"></b></div>
            <div class="box"><span>Plemiona</span><b id="tribes"></b></div>
            <div class="box"><span>OD</span><b id="od"></b></div>
            <div class="box"><span>ODA</span><b id="oda"></b></div>
        </div>
        <div class="footer">
            <span>ID: <b id="worldId"></b></span>
            <span>Utworzono: <b id="created"></b></span>
        </div>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
