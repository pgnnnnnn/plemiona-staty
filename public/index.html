<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Mapa Świata 224</title>
<style>
  html, body {
    margin:0;
    padding:0;
    height:100%;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
  }
  iframe {
    width:100%;
    height:100%;
    border:none;
  }
</style>
</head>
<body>

<iframe id="mapFrame" src="https://pl224.tribalwarsmap.com/pl/69bc0daa3ffb1"></iframe>

<script>
  // Funkcja automatycznego odświeżania co 5 minut (300000 ms)
  setInterval(() => {
    const iframe = document.getElementById("mapFrame");
    iframe.src = iframe.src;
  }, 300000);
</script>

</body>
</html>
