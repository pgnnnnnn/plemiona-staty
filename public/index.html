<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Staty PRO MAX</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🔥 Staty PL224 PRO MAX</h1>

<div class="replay">
    <button id="playBtn">▶️ Play</button>
    <input type="range" id="slider" min="0" max="0" value="0">
    <span id="dateLabel"></span>
</div>

<div class="container">
    <div class="table-box">
        <table id="table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Gracz</th>
                    <th>Punkty</th>
                    <th>+/-</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <h2>🏰 Ranking plemion</h2>
        <table id="tribeTable">
            <tbody></tbody>
        </table>
    </div>

    <div class="map-box">
        <canvas id="map"></canvas>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
