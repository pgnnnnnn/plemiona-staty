<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>
.big-table {
  width:100%;
  border-collapse:collapse;
}

.big-table th {
  background:#1f1f1f;
  padding:10px;
}

.big-table td {
  padding:8px;
  border-bottom:1px solid #1a1a1a;
  text-align:center;
}

.big-table tr:hover {
  background:#222;
}
</style>

</head>
<body>

<div class="layout">

<div class="sidebar" id="sidebar">
  <div class="toggle" onclick="toggle()">☰</div>
  <div class="logo">STATY</div>

  <div class="menu">
    <a href="/" class="active">🏠 Dashboard</a>
    <a href="/players.html">👤 Gracze</a>
    <a href="/tribes.html">⚔️ Plemiona</a>
  </div>
</div>

<div class="content">

<div class="panel">

<h1>Dashboard PRO</h1>

<div id="timer"></div>
<div onclick="manualRefresh()">↻ Odśwież teraz</div>

<table class="big-table">
<thead>
<tr>
<th>#</th>
<th>Plemie</th>
<th>Punkty</th>
<th>Gracze</th>
<th>Wioski</th>
<th>ODA</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>

</div>

</div>

<script>
function toggle(){
  const s=document.getElementById("sidebar");
  s.classList.toggle("collapsed");
  localStorage.setItem("sidebar", s.classList.contains("collapsed"));
}

window.onload=()=>{
  if(localStorage.getItem("sidebar")==="true"){
    document.getElementById("sidebar").classList.add("collapsed");
  }
};

let data=[];

async function init(){
  const res=await fetch("/api/tribes");
  data=await res.json();
  render();
}

function render(){
  let i=1;

  document.getElementById("t").innerHTML =
  data.map(x=>`
    <tr>
      <td>${i++}</td>
      <td>${x.tag}</td>
      <td>${x.points.toLocaleString()}</td>
      <td>${x.members}</td>
      <td>${x.villages}</td>
      <td>${x.oda.toLocaleString()}</td>
    </tr>
  `).join("");
}

// TIMER
let refreshTime=300;
let current=refreshTime;

function startTimer(){
  setInterval(()=>{
    current--;
    document.getElementById("timer").innerText="Odświeżanie za: "+current+"s";

    if(current<=0){
      current=refreshTime;
      init();
    }
  },1000);
}

function manualRefresh(){
  current=refreshTime;
  init();
}

init();
startTimer();
</script>

</body>
</html>
