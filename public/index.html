<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>
.big-table { width:100%; border-collapse:collapse; margin-top:20px; }
.big-table th { background:#1f1f1f; padding:10px; font-size:12px; cursor:pointer; }
.big-table td { padding:8px; border-bottom:1px solid #1a1a1a; text-align:center; }
.big-table tr:hover { background:#222; }

.top1 { background:rgba(255,215,0,0.15); }
.top2 { background:rgba(192,192,192,0.15); }
.top3 { background:rgba(205,127,50,0.15); }

.tag { font-weight:bold; }

.green { color:#2ecc71; }
.red { color:#e74c3c; }

.header-bar {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}

input {
  padding:6px;
  background:#1f1f1f;
  border:none;
  color:#fff;
  width:120px;
}

.search { width:200px; }

.reset-btn {
  background:#e74c3c;
  padding:6px 10px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="layout">

<div class="sidebar" id="sidebar">
  <div class="toggle" onclick="toggle()">☰</div>
  <div class="logo">STATY</div>

  <div class="menu">
    <a href="/" class="active">🏠 Dashboard</a>
    <a href="/players.html">👤 Gracze</a>
    <a href="/tribes.html">⚔️ Plemiona</a>
  </div>
</div>

<div class="content">
<div class="panel">

<div class="header-bar">
  <h1>Ranking Rodzin</h1>

  <!-- SEARCH -->
  <input id="searchInput" class="search" placeholder="Szukaj..." oninput="setSearch(this.value)">

  <!-- FILTERY -->
  <input id="pointsMin" placeholder="Min pkt" oninput="setFilter('pointsMin', this.value)">
  <input id="pointsMax" placeholder="Max pkt" oninput="setFilter('pointsMax', this.value)">

  <input id="membersMin" placeholder="Min graczy" oninput="setFilter('membersMin', this.value)">
  <input id="membersMax" placeholder="Max graczy" oninput="setFilter('membersMax', this.value)">

  <input id="villagesMin" placeholder="Min wiosek" oninput="setFilter('villagesMin', this.value)">
  <input id="villagesMax" placeholder="Max wiosek" oninput="setFilter('villagesMax', this.value)">

  <!-- RESET -->
  <div class="reset-btn" onclick="resetFilters()">Reset</div>

  <div>
    <div id="timer"></div>
    <div onclick="manualRefresh()">↻</div>
  </div>
</div>

<table class="big-table">
<thead>
<tr>
<th onclick="setSort('rank')">#</th>
<th onclick="setSort('tag')">Plemie</th>
<th onclick="setSort('points')">Punkty</th>
<th onclick="setSort('members')">Gracze</th>
<th onclick="setSort('villages')">Wioski</th>
<th onclick="setSort('avg')">Śr</th>
<th>ODA</th>
<th onclick="setSort('gain')">Δ</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>
</div>
</div>

<script>
// SIDEBAR
function toggle(){
  const s=document.getElementById("sidebar");
  s.classList.toggle("collapsed");
  localStorage.setItem("sidebar", s.classList.contains("collapsed"));
}

// STATE
let data=[];
let sortKey="points";
let sortDir="desc";
let search="";
let filters={
  pointsMin:null, pointsMax:null,
  membersMin:null, membersMax:null,
  villagesMin:null, villagesMax:null
};

// 🔥 LOAD SAVED SETTINGS
function loadSettings(){
  const saved = JSON.parse(localStorage.getItem("filters")||"{}");

  search = saved.search || "";
  filters = saved.filters || filters;
  sortKey = saved.sortKey || "points";
  sortDir = saved.sortDir || "desc";

  // inputy
  document.getElementById("searchInput").value = search;

  Object.keys(filters).forEach(k=>{
    const el = document.getElementById(k);
    if(el) el.value = filters[k] ?? "";
  });
}

// 💾 SAVE SETTINGS
function saveSettings(){
  localStorage.setItem("filters", JSON.stringify({
    search,
    filters,
    sortKey,
    sortDir
  }));
}

// LOAD
async function init(){
  loadSettings();

  const res=await fetch("/api/tribes");
  data=await res.json();

  render();
}

// SEARCH
function setSearch(val){
  search = val.toLowerCase();
  saveSettings();
  render();
}

// FILTER
function setFilter(key,val){
  filters[key] = val ? parseInt(val) : null;
  saveSettings();
  render();
}

// RESET
function resetFilters(){
  search="";
  filters={
    pointsMin:null, pointsMax:null,
    membersMin:null, membersMax:null,
    villagesMin:null, villagesMax:null
  };

  localStorage.removeItem("filters");

  document.querySelectorAll("input").forEach(i=>i.value="");

  render();
}

// SORT
function setSort(key){
  if(sortKey===key){
    sortDir = sortDir==="asc" ? "desc" : "asc";
  } else {
    sortKey = key;
    sortDir = "desc";
  }
  saveSettings();
  render();
}

// RENDER
function render(){

  let filtered = data.filter(x => {
    if(!x.tag.toLowerCase().includes(search)) return false;

    if(filters.pointsMin && x.points < filters.pointsMin) return false;
    if(filters.pointsMax && x.points > filters.pointsMax) return false;

    if(filters.membersMin && x.members < filters.membersMin) return false;
    if(filters.membersMax && x.members > filters.membersMax) return false;

    if(filters.villagesMin && x.villages < filters.villagesMin) return false;
    if(filters.villagesMax && x.villages > filters.villagesMax) return false;

    return true;
  });

  let sorted=[...filtered].map(x=>({
    ...x,
    avg: Math.round(x.points/(x.members||1))
  }));

  sorted.sort((a,b)=>{
    let val;

    if(sortKey==="tag"){
      val = a.tag.localeCompare(b.tag);
    } else {
      val = (a[sortKey]||0) - (b[sortKey]||0);
    }

    return sortDir==="asc" ? val : -val;
  });

  document.getElementById("t").innerHTML =
  sorted.map((x,i)=>{

    let cls="";
    if(i===0) cls="top1";
    if(i===1) cls="top2";
    if(i===2) cls="top3";

    return `
    <tr class="${cls}">
      <td>${i+1}</td>
      <td class="tag" style="color:${x.color}">${x.tag}</td>
      <td>${x.points.toLocaleString()}</td>
      <td>${x.members}</td>
      <td>${x.villages}</td>
      <td>${x.avg.toLocaleString()}</td>
      <td>—</td>
      <td class="${x.gain>=0?'green':'red'}">
        ${x.gain>=0?'+':''}${x.gain.toLocaleString()}
      </td>
    </tr>
    `;
  }).join("");
}

// TIMER
let t=300;

setInterval(()=>{
  t--;
  document.getElementById("timer").innerText="Refresh: "+t;

  if(t<=0){
    t=300;
    init();
  }
},1000);

function manualRefresh(){
  t=300;
  init();
}

// START
init();
</script>

</body>
</html>
