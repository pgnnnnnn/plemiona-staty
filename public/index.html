<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Staty PRO MAX</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🔥 Staty PRO MAX</h1>

<div class="top-bar">
    <select id="worldSelect">
        <option value="pl224">pl224</option>
        <option value="pl226">pl226</option>
    </select>

    <button id="playBtn">▶️</button>
    <button id="exportBtn">📸</button>

    <input type="range" id="slider">
    <span id="dateLabel"></span>

    <input id="searchInput" placeholder="🔍 gracz">
    <button id="resetView">Reset</button>
    <button id="heatmapBtn">🔥</button>
</div>

<!-- 📅 GRID DAT -->
<div class="card">
    <h3>📅 Historia</h3>
    <div id="dateGrid" class="date-grid"></div>
</div>

<!-- 📊 WYKRESY -->
<div class="card">
    <h3>📈 Wzrost świata</h3>
    <canvas id="chart"></canvas>
</div>

<div class="card">
    <h3>🏰 Plemiona w czasie</h3>
    <canvas id="tribeChart"></canvas>
</div>

<!-- 🗺️ MAPA -->
<div class="card">
    <h3>🗺️ Mapa dominacji</h3>
    <canvas id="map"></canvas>
    <div id="legend"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>
</body>
</html>
