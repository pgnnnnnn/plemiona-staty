<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Staty Plemiion</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h1>📊 Staty Plemiion</h1>

    <div class="controls">
        <select id="world">
            <option value="pl224">pl224</option>
            <option value="pl226">pl226</option>
        </select>

        <button id="warBtn">🔥 Wojny</button>
    </div>
</div>

<div class="container">

    <div class="card">
        <h2>👤 TOP Gracze</h2>
        <table id="table">
            <thead>
                <tr><th>#</th><th>Gracz</th><th>Punkty</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card">
        <h2>🏰 Plemiona</h2>
        <table id="tribes">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Plemię</th>
                    <th>Punkty</th>
                    <th>Gracze</th>
                    <th>⚔️</th>
                    <th>🛡️</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card">
        <h2>📋 Oficjalne (guest)</h2>
        <table id="guest">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Plemię</th>
                    <th>Punkty</th>
                    <th>Gracze</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card full">
        <h2>🗺️ Mapa dominacji</h2>
        <canvas id="map"></canvas>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
