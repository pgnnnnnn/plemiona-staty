<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>
.big-table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

.big-table th {
  background:#1f1f1f;
  padding:10px;
  font-size:12px;
}

.big-table td {
  padding:8px;
  border-bottom:1px solid #1a1a1a;
  text-align:center;
}

.big-table tr:hover {
  background:#222;
}

.tag {
  font-weight:bold;
}

.green { color:#2ecc71; }
.red { color:#e74c3c; }

.header-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
}
</style>

</head>
<body>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="toggle" onclick="toggle()">☰</div>
  <div class="logo">STATY</div>

  <div class="menu">
    <a href="/" class="active">🏠 <span class="text">Dashboard</span></a>
    <a href="/players.html">👤 <span class="text">Gracze</span></a>
    <a href="/tribes.html">⚔️ <span class="text">Plemiona</span></a>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

<div class="panel">

<div class="header-bar">
  <h1>Ranking Rodzin</h1>
  <div>
    <div id="timer" class="timer"></div>
    <div class="refresh" onclick="manualRefresh()">↻ Odśwież</div>
  </div>
</div>

<table class="big-table">
<thead>
<tr>
<th>#</th>
<th>Plemie</th>
<th>Punkty</th>
<th>Gracze</th>
<th>Wioski</th>
<th>Śr / gracz</th>
<th>ODA</th>
<th>Δ Punkty</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>

</div>

</div>

<script>
// SIDEBAR
function toggle(){
  const s=document.getElementById("sidebar");
  s.classList.toggle("collapsed");
  localStorage.setItem("sidebar", s.classList.contains("collapsed"));
}

window.onload=()=>{
  if(localStorage.getItem("sidebar")==="true"){
    document.getElementById("sidebar").classList.add("collapsed");
  }
};

// DATA
let data=[];

async function init(){
  const res=await fetch("/api/tribes");
  data=await res.json();
  render();
}

// 🔥 RENDER (NAPRAWIONY)
function render(){
  let i=1;

  document.getElementById("t").innerHTML =
  data.sort((a,b)=>b.points-a.points).map(x=>{

    const avg = Math.round(x.points / (x.members || 1));

    return `
    <tr>
      <td>${i++}</td>
      <td class="tag" style="color:${x.color}">${x.tag}</td>
      <td>${x.points.toLocaleString()}</td>
      <td>${x.members}</td>
      <td>${x.villages}</td>
      <td>${avg.toLocaleString()}</td>

      <!-- ODA wyłączone -->
      <td>—</td>

      <!-- REALNY PRZYROST -->
      <td class="${x.gain >= 0 ? 'green' : 'red'}">
        ${x.gain >= 0 ? '+' : ''}${x.gain.toLocaleString()}
      </td>
    </tr>
    `;
  }).join("");
}

// TIMER
let refreshTime=300;
let current=refreshTime;

function startTimer(){
  setInterval(()=>{
    current--;

    document.getElementById("timer").innerText =
      "Odświeżanie za: "+current+"s";

    if(current<=0){
      current=refreshTime;
      init();
    }

  },1000);
}

function manualRefresh(){
  current=refreshTime;
  init();
}

// START
init();
startTimer();
</script>

</body>
</html>
