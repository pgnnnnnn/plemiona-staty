<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>
.big-table { width:100%; border-collapse:collapse; }
.big-table th { background:#1f1f1f; padding:10px; font-size:12px; }
.big-table td { padding:8px; border-bottom:1px solid #1a1a1a; text-align:center; }
.big-table tr:hover { background:#222; }

.green { color:#2ecc71; }
.red { color:#e74c3c; }
</style>

</head>
<body>

<div class="layout">

<div class="sidebar" id="sidebar">
  <div class="toggle" onclick="toggle()">☰</div>
  <div class="logo">STATY</div>
</div>

<div class="content">

<div class="panel">

<h1>Ranking Rodzin</h1>

<table class="big-table">
<thead>
<tr>
<th>#</th>
<th>Plemie</th>
<th>Punkty</th>
<th>Δ Punkty</th>
<th>Wioski</th>
<th>Δ Wioski</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>

</div>

</div>

<script>
function toggle(){
  document.getElementById("sidebar").classList.toggle("collapsed");
}

async function load(){
  const res = await fetch("/api/dashboard");
  const data = await res.json();

  let i=1;

  document.getElementById("t").innerHTML =
  data.map(x=>`
    <tr>
      <td>${i++}</td>
      <td style="color:${x.color}">${x.tag}</td>
      <td>${x.points.toLocaleString()}</td>
      <td class="${x.gain.points>=0?'green':'red'}">
        ${x.gain.points>=0?'+':''}${x.gain.points.toLocaleString()}
      </td>
      <td>${x.villages}</td>
      <td class="${x.gain.villages>=0?'green':'red'}">
        ${x.gain.villages>=0?'+':''}${x.gain.villages}
      </td>
    </tr>
  `).join("");
}

load();
</script>

</body>
</html>
