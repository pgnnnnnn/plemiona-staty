<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Staty PRO</title>
<link rel="stylesheet" href="style.css">

<style>
.section {
  margin-bottom:20px;
  background:#151515;
  padding:15px;
  border-radius:10px;
}

.blue { border-left:5px solid #3498db; }
.green { border-left:5px solid #2ecc71; }

.big-table {
  width:100%;
  border-collapse:collapse;
}

.big-table th {
  background:#1f1f1f;
  padding:8px;
}

.big-table td {
  padding:6px;
  text-align:center;
  border-bottom:1px solid #1a1a1a;
}

.pos { color:#2ecc71; }
.neg { color:#e74c3c; }
</style>

</head>
<body>

<div class="layout">

<div class="sidebar">
  <div class="logo">STATY</div>
</div>

<div class="content">

<h1>Statystyki świata</h1>

<!-- 🔵 PRZYROST -->
<div class="section blue">
<h2>📈 Przyrost punktów</h2>
<table class="big-table">
<thead>
<tr>
<th>#</th>
<th>Plemie</th>
<th>Przyrost</th>
</tr>
</thead>
<tbody id="gain"></tbody>
</table>
</div>

<!-- 🟢 DOMINACJA -->
<div class="section green">
<h2>🌍 Dominacja świata</h2>
<table class="big-table">
<thead>
<tr>
<th>#</th>
<th>Plemie</th>
<th>%</th>
</tr>
</thead>
<tbody id="dom"></tbody>
</table>
</div>

<!-- 📊 RANKING -->
<div class="section">
<h2>🏆 Ranking</h2>
<table class="big-table">
<thead>
<tr>
<th>#</th>
<th>Plemie</th>
<th>Punkty</th>
<th>Gracze</th>
<th>Wioski</th>
</tr>
</thead>
<tbody id="main"></tbody>
</table>
</div>

</div>
</div>

<script>
async function load(){
  const res = await fetch("/api/dashboard");
  const data = await res.json();

  // 🔵 GAIN
  document.getElementById("gain").innerHTML =
  data.map((x,i)=>`
    <tr>
      <td>${i+1}</td>
      <td style="color:${x.color}">${x.tag}</td>
      <td class="${x.gain>=0?'pos':'neg'}">
        ${x.gain>=0?'+':''}${x.gain.toLocaleString()}
      </td>
    </tr>
  `).join("");

  // 🟢 DOM
  document.getElementById("dom").innerHTML =
  data.map((x,i)=>`
    <tr>
      <td>${i+1}</td>
      <td style="color:${x.color}">${x.tag}</td>
      <td>${x.dom}%</td>
    </tr>
  `).join("");

  // 📊 MAIN
  document.getElementById("main").innerHTML =
  data.map((x,i)=>`
    <tr>
      <td>${i+1}</td>
      <td style="color:${x.color}">${x.tag}</td>
      <td>${x.points.toLocaleString()}</td>
      <td>${x.members}</td>
      <td>${x.villages}</td>
    </tr>
  `).join("");
}

load();
</script>

</body>
</html>
