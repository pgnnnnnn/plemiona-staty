<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Staty</title>
<link rel="stylesheet" href="style.css">

<style>
.big-table { width:100%; border-collapse:collapse; }
.big-table th { background:#1f1f1f; padding:8px; }
.big-table td { padding:6px; text-align:center; border-bottom:1px solid #1a1a1a; }

.pos { color:#2ecc71; }
.neg { color:#e74c3c; }
</style>

</head>
<body>

<div class="content">

<h1>Statystyki świata</h1>

<table class="big-table">
<thead>
<tr>
<th>#</th>
<th>Plemie</th>
<th>Punkty</th>
<th>Δ</th>
<th>RA</th>
<th>RO</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>

<script>
async function load(){
  const res = await fetch("/api/dashboard");
  const data = await res.json();

  document.getElementById("t").innerHTML =
    data.map((x,i)=>`
      <tr>
        <td>${i+1}</td>
        <td style="color:${x.color}">${x.tag}</td>
        <td>${x.points.toLocaleString()}</td>
        <td class="${x.gain>=0?'pos':'neg'}">
          ${x.gain>=0?'+':''}${x.gain.toLocaleString()}
        </td>
        <td class="pos">${x.ra.toLocaleString()}</td>
        <td class="neg">${x.ro.toLocaleString()}</td>
      </tr>
    `).join("");
}

load();
</script>

</body>
</html>
