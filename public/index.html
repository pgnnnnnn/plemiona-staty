<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

<div class="sidebar">
  <div class="logo">STATY 224</div>

  <div class="menu">
    <a href="/" class="active">Dashboard</a>
    <a href="/players.html">Gracze</a>
    <a href="/tribes.html">Plemiona</a>
    <a href="/map.html">Mapa</a>
  </div>
</div>

<div class="content">

<div class="panel">

<h1>Dashboard</h1>

<div id="stats"></div>

</div>

</div>

</div>

<script>
async function load(){
  const [p,t] = await Promise.all([
    fetch("/api/players"),
    fetch("/api/tribes")
  ]);

  const players = await p.json();
  const tribes = await t.json();

  document.getElementById("stats").innerHTML = `
    Gracze: ${players.length}<br>
    Plemiona: ${tribes.length}<br>
  `;
}

load();
</script>

</body>
</html>
