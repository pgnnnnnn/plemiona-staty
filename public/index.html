<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

<div class="sidebar" id="sidebar">
  <div class="toggle" onclick="toggle()">☰</div>
  <div class="logo">STATY</div>

  <div class="menu">
    <a href="/" class="active" data-tip="Dashboard">🏠 <span class="text">Dashboard</span></a>
    <a href="/players.html" data-tip="Gracze">👤 <span class="text">Gracze</span></a>
    <a href="/tribes.html" data-tip="Plemiona">⚔️ <span class="text">Plemiona</span></a>
  </div>
</div>

<div class="content">

<div class="panel">

<h1>Dashboard</h1>

<div id="timer" class="timer"></div>
<div class="refresh" onclick="manualRefresh()">↻ Odśwież teraz</div>

<div id="stats"></div>

</div>

</div>

</div>

<script>
// sidebar
function toggle(){
  const s=document.getElementById("sidebar");
  s.classList.toggle("collapsed");
  localStorage.setItem("sidebar", s.classList.contains("collapsed"));
}

window.onload=()=>{
  if(localStorage.getItem("sidebar")==="true"){
    document.getElementById("sidebar").classList.add("collapsed");
  }
};

// data
async function init(){
  const [p,t]=await Promise.all([
    fetch("/api/players"),
    fetch("/api/tribes")
  ]);

  const players=await p.json();
  const tribes=await t.json();

  document.getElementById("stats").innerHTML=`
    Gracze: ${players.length}<br>
    Plemiona: ${tribes.length}
  `;
}

// 🔥 LIVE UPDATE
let refreshTime=300;
let current=refreshTime;
let timerInterval;

function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    current--;
    document.getElementById("timer").innerText="Odświeżanie za: "+current+"s";

    if(current<=0){
      current=refreshTime;
      reloadData();
      showRefresh();
    }
  },1000);
}

async function reloadData(){
  await init();
}

function manualRefresh(){
  current=refreshTime;
  reloadData();
  showRefresh();
}

function showRefresh(){
  const el=document.getElementById("timer");
  el.innerText="✔ Odświeżono";
  setTimeout(()=>{
    el.innerText="Odświeżanie za: "+current+"s";
  },1500);
}

// start
init();
startTimer();
</script>

</body>
</html>
