<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Staty PRO MAX</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🔥 Staty PRO MAX</h1>

<select id="worldSelect">
    <option value="pl224">pl224</option>
    <option value="pl226">pl226</option>
</select>

<div class="replay">
    <button id="playBtn">▶️ Play</button>
    <button id="exportBtn">📸 Export</button>
    <input type="range" id="slider">
    <span id="dateLabel"></span>
</div>

<div class="tools">
    <input id="searchInput" placeholder="🔍 Szukaj gracza">
    <button id="resetView">Reset</button>
    <button id="heatmapBtn">🔥 Heatmap</button>
</div>

<canvas id="chart"></canvas>
<canvas id="tribeChart"></canvas>

<div class="container">
    <div class="table-box">
        <table id="table">
            <tbody></tbody>
        </table>
    </div>
    <div class="map-box">
        <canvas id="map"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>
</body>
</html>
