<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plemie</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container panel">

<h1 id="name"></h1>

<table>
<thead>
<tr>
<th>#</th>
<th>Nick</th>
<th>Punkty</th>
<th>Wioski</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>

<script>
const id=new URLSearchParams(location.search).get("id");

async function load(){
  const res=await fetch("/api/tribe/"+id);
  const data=await res.json();

  if(data.length){
    document.getElementById("name").innerText="Plemie: "+data[0].tribe;
  }

  let i=1;

  document.getElementById("t").innerHTML =
  data.map(x=>`
    <tr>
      <td>${i++}</td>
      <td>${x.name}</td>
      <td>${x.points}</td>
      <td>${x.villages}</td>
    </tr>
  `).join("");
}

load();
</script>

</body>
</html>
