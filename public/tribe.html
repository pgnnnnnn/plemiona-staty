<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plemie</title>
<link rel="stylesheet" href="style.css">

<style>
.breadcrumb {
  margin-bottom:15px;
  color:#888;
}

.breadcrumb a {
  color:#aaa;
  text-decoration:none;
}

.breadcrumb a:hover {
  color:#fff;
}

.header-box {
  background:#1a1a1a;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
}

.stat {
  margin-right:20px;
}
</style>

</head>
<body>

<div class="nav">
  <div class="logo">STATY 224</div>
</div>

<div class="container panel">

<!-- 🔥 BREADCRUMB -->
<div class="breadcrumb">
  <a href="/tribes.html">Plemiona</a> → <span id="crumb"></span>
</div>

<!-- 🔥 HEADER -->
<div class="header-box">
  <div class="stat"><b id="tag"></b></div>
  <div class="stat">Punkty: <b id="points"></b></div>
  <div class="stat">Wioski: <b id="villages"></b></div>
  <div class="stat">Członkowie: <b id="members"></b></div>
</div>

<input id="search" placeholder="Szukaj gracza...">

<table>
<thead>
<tr>
<th onclick="sortBy('points')">#</th>
<th onclick="sortBy('name')">Nick</th>
<th onclick="sortBy('points')">Punkty</th>
<th onclick="sortBy('villages')">Wioski</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>

<script>
const id = new URLSearchParams(location.search).get("id");

let data = [];
let sortKey = "points";
let asc = false;

// 🔥 pobieramy plemiona (żeby mieć stats)
let allTribes = [];

async function init(){
  const [playersRes, tribesRes] = await Promise.all([
    fetch("/api/tribe/" + id),
    fetch("/api/tribes")
  ]);

  data = await playersRes.json();
  allTribes = await tribesRes.json();

  const tribe = allTribes.find(t => t.id == id);

  if(tribe){
    document.getElementById("tag").innerText = tribe.tag;
    document.getElementById("points").innerText = tribe.points;
    document.getElementById("villages").innerText = tribe.villages;
    document.getElementById("members").innerText = tribe.members;
    document.getElementById("crumb").innerText = tribe.tag;
  }

  render();
}

function sortBy(key){
  if(sortKey === key){
    asc = !asc;
  } else {
    sortKey = key;
    asc = false;
  }
  render();
}

document.getElementById("search").addEventListener("input", render);

function render(){
  const q = document.getElementById("search").value.toLowerCase();

  let list = [...data]
    .filter(x => x.name.toLowerCase().includes(q))
    .sort((a,b)=>{
      if(sortKey==="name"){
        return asc
          ? a.name.localeCompare(b.name)
          : b.name.localeCompare(a.name);
      }
      return asc ? a[sortKey]-b[sortKey] : b[sortKey]-a[sortKey];
    });

  let i = 1;

  document.getElementById("t").innerHTML =
  list.map(x=>`
    <tr>
      <td>${i++}</td>
      <td>${x.name}</td>
      <td>${x.points}</td>
      <td>${x.villages}</td>
    </tr>
  `).join("");
}

init();
</script>

</body>
</html>
