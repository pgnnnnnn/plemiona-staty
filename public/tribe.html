<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Plemie</title>
<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<div class="nav">
  <div class="logo">STATY 224</div>
  <div>
    <a href="/tribes.html">← Powrót</a>
  </div>
</div>

<div class="container">

<div class="panel">

<h1 id="name"></h1>

<p id="gain" class="muted"></p>

<canvas id="chart"></canvas>

</div>

</div>

<script>
const id = new URLSearchParams(location.search).get("id");

async function load(){
  const res = await fetch("/api/tribe/"+id);
  const data = await res.json();

  document.getElementById("name").innerText = data.tribe.tag;

  // 🔥 LICZENIE GAIN
  if (data.history.length > 1) {
    const first = data.history[0].points;
    const last = data.history[data.history.length-1].points;
    const gain = last - first;

    document.getElementById("gain").innerText =
      "Przyrost: +" + gain + " pkt";
  }

  // 📊 WYKRES
  const labels = data.history.map(x => {
    const d = new Date(x.time);
    return d.getHours() + ":" + d.getMinutes();
  });

  const points = data.history.map(x => x.points);

  new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Punkty",
        data: points
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display:false }
      }
    }
  });
}

load();
</script>

</body>
</html>
