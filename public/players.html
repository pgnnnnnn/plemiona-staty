<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gracze</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">
  <div class="logo">STATY 224</div>
  <div>
    <a href="/">Home</a>
  </div>
</div>

<div class="container">

<div class="panel">

<h1>Ranking graczy</h1>

<input class="search" id="search" placeholder="Szukaj..." onkeyup="render()">

<table>
<thead>
<tr>
<th>#</th>
<th>Nick</th>
<th>Punkty</th>
<th>Wioski</th>
<th>Plemie</th>
</tr>
</thead>

<tbody id="t"></tbody>

</table>

</div>

</div>

<script>
let data = [];

async function init(){
  const res = await fetch("/api/players");
  data = await res.json();
  render();
}

function render(){
  const q = document.getElementById("search").value.toLowerCase();
  let i = 1;

  document.getElementById("t").innerHTML =
  data
  .filter(x => x.name.toLowerCase().includes(q))
  .slice(0,300)
  .map(x=>`
    <tr onclick="go(${x.id})">
      <td>${i++}</td>
      <td>${x.name}</td>
      <td>${x.points}</td>
      <td>${x.villages}</td>
      <td>${x.tribe}</td>
    </tr>
  `).join("");
}

function go(id){
  location.href = "/player.html?id=" + id;
}

init();
</script>

</body>
</html>
