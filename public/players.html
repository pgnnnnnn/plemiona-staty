<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Gracze</title>
<link rel="stylesheet" href="style.css">

<style>
table{width:100%;border-collapse:collapse;table-layout:fixed;}
th,td{padding:10px;border-bottom:1px solid #1a1a1a;text-align:center;}
th{background:#1f1f1f;cursor:pointer;}

th:nth-child(1),td:nth-child(1){width:60px;}
th:nth-child(2),td:nth-child(2){width:40%;text-align:left;}
th:nth-child(3),td:nth-child(3){width:20%;}
th:nth-child(4),td:nth-child(4){width:15%;}
th:nth-child(5),td:nth-child(5){width:20%;}

td:nth-child(2){padding-left:15px;}
tr:hover{background:#1a1a1a;}

.search{width:100%;padding:10px;background:#1f1f1f;border:none;color:#fff;margin-bottom:10px;}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar" id="sidebar">
  <div class="toggle" onclick="toggle()">☰</div>
  <div class="logo">STATY</div>

  <div class="menu">
    <a href="/">🏠 Dashboard</a>
    <a href="/players.html" class="active">👤 Gracze</a>
    <a href="/tribes.html">⚔️ Plemiona</a>
  </div>
</div>

<div class="content">
<div class="panel">

<input class="search" placeholder="Szukaj..." oninput="searchPlayer(this.value)">

<table>
<thead>
<tr>
<th>#</th>
<th onclick="sortBy('name')">Nick</th>
<th onclick="sortBy('points')">Punkty</th>
<th onclick="sortBy('villages')">Wioski</th>
<th onclick="sortBy('tribe')">Plemie</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>
</div>
</div>

<script>
function toggle(){
  const s=document.getElementById("sidebar");
  s.classList.toggle("collapsed");
}

let data=[];
let filtered=[];
let sortKey="points";
let sortDir="desc";

async function init(){
  const res = await fetch("/api/players");
  data = await res.json();
  filtered = data;
  render();
}

function searchPlayer(val){
  val = val.toLowerCase();
  filtered = data.filter(p =>
    p.name.toLowerCase().includes(val) ||
    p.tribe.toLowerCase().includes(val)
  );
  render();
}

function sortBy(key){
  if(sortKey===key){
    sortDir = sortDir==="asc"?"desc":"asc";
  } else {
    sortKey = key;
    sortDir = "desc";
  }
  render();
}

function player(id){
  location.href="/player.html?id="+id;
}

function render(){
  let sorted=[...filtered];

  sorted.sort((a,b)=>{
    if(sortKey==="name"||sortKey==="tribe"){
      return sortDir==="asc"
        ? a[sortKey].localeCompare(b[sortKey])
        : b[sortKey].localeCompare(a[sortKey]);
    }
    return sortDir==="asc"
      ? a[sortKey]-b[sortKey]
      : b[sortKey]-a[sortKey];
  });

  let i=1;

  document.getElementById("t").innerHTML =
  sorted.map(p=>`
    <tr>
      <td>${i++}</td>
      <td onclick="player(${p.id})" style="cursor:pointer">${p.name}</td>
      <td>${p.points.toLocaleString()}</td>
      <td>${p.villages}</td>
      <td style="color:${p.color}">${p.tribe}</td>
    </tr>
  `).join("");
}

init();
</script>

</body>
</html>
