<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Gracze</title>
<link rel="stylesheet" href="style.css">

<style>
body { background:#0f0f0f; color:#fff; font-family:sans-serif; }

table {
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th, td {
  padding:10px;
  text-align:center;
  border-bottom:1px solid #1a1a1a;
}

th {
  background:#1f1f1f;
  cursor:pointer;
}

/* 📐 KOLUMNY */
th:nth-child(1), td:nth-child(1) { width:60px; }
th:nth-child(2), td:nth-child(2) { width:40%; text-align:left; }
th:nth-child(3), td:nth-child(3) { width:20%; }
th:nth-child(4), td:nth-child(4) { width:15%; }
th:nth-child(5), td:nth-child(5) { width:20%; }

/* hover */
tr:hover { background:#1a1a1a; }

/* top3 */
.top1 { background:rgba(255,215,0,0.1); }
.top2 { background:rgba(192,192,192,0.1); }
.top3 { background:rgba(205,127,50,0.1); }

/* search */
.search {
  width:100%;
  padding:10px;
  background:#1f1f1f;
  border:none;
  color:#fff;
  margin-bottom:10px;
}
</style>
</head>

<body>

<input class="search" placeholder="Szukaj..." oninput="searchPlayer(this.value)">

<table>
<thead>
<tr>
<th>#</th>
<th onclick="sortBy('name')">Nick</th>
<th onclick="sortBy('points')">Punkty</th>
<th onclick="sortBy('villages')">Wioski</th>
<th onclick="sortBy('tribe')">Plemie</th>
</tr>
</thead>

<tbody id="t"></tbody>
</table>

<script>
let data=[];
let filtered=[];
let sortKey="points";
let sortDir="desc";

// LOAD
async function init(){
  const res = await fetch("/api/players");
  data = await res.json();
  filtered = data;
  render();
}

// SEARCH
function searchPlayer(val){
  val = val.toLowerCase();

  filtered = data.filter(p =>
    p.name.toLowerCase().includes(val) ||
    p.tribe.toLowerCase().includes(val)
  );

  render();
}

// SORT
function sortBy(key){
  if(sortKey===key){
    sortDir = sortDir==="asc" ? "desc" : "asc";
  } else {
    sortKey = key;
    sortDir = "desc";
  }
  render();
}

// RENDER
function render(){

  let sorted=[...filtered];

  sorted.sort((a,b)=>{
    let val;

    if(sortKey==="name" || sortKey==="tribe"){
      val = a[sortKey].localeCompare(b[sortKey]);
    } else {
      val = a[sortKey] - b[sortKey];
    }

    return sortDir==="asc" ? val : -val;
  });

  document.getElementById("t").innerHTML =
  sorted.map((p,i)=>{

    let cls="";
    if(i===0) cls="top1";
    if(i===1) cls="top2";
    if(i===2) cls="top3";

    return `
    <tr class="${cls}">
      <td>${i+1}</td>
      <td style="text-align:left;padding-left:15px">${p.name}</td>
      <td>${p.points.toLocaleString()}</td>
      <td>${p.villages}</td>
      <td style="color:${p.color}">${p.tribe}</td>
    </tr>
    `;
  }).join("");
}

// START
init();
</script>

</body>
</html>
