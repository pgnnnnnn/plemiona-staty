<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Gracze</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container panel">

<h1>Ranking graczy</h1>

<input id="search" placeholder="Szukaj gracza...">

<table>
<thead>
<tr>
<th>#</th>
<th>Nick</th>
<th>Punkty</th>
<th>Wioski</th>
<th>Plemie</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>

<script>
let data=[];

async function init(){
  const res = await fetch("/api/players");
  data = await res.json();
  render();
}

document.getElementById("search").addEventListener("input", render);

function render(){
  const q = document.getElementById("search").value.toLowerCase();

  let i=1;

  document.getElementById("t").innerHTML =
  data
  .filter(x => (x.name||"").toLowerCase().includes(q))
  .slice(0,300)
  .map(x=>`
    <tr>
      <td>${i++}</td>
      <td>${x.name}</td>
      <td>${x.points}</td>
      <td>${x.villages}</td>
      <td>${x.tribe}</td>
    </tr>
  `).join("");
}

init();
</script>

</body>
</html>
