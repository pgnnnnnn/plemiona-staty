<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Gracze</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

<div class="sidebar" id="sidebar">
  <div class="toggle" onclick="toggle()">☰</div>
  <div class="logo">STATY</div>

  <div class="menu">
    <a href="/" data-tip="Dashboard">🏠 <span class="text">Dashboard</span></a>
    <a href="/players.html" class="active" data-tip="Gracze">👤 <span class="text">Gracze</span></a>
    <a href="/tribes.html" data-tip="Plemiona">⚔️ <span class="text">Plemiona</span></a>
  </div>
</div>

<div class="content">

<div class="panel">

<div class="back" onclick="history.back()">← Powrót</div>

<h1>Gracze</h1>

<input id="search" placeholder="Szukaj...">

<table>
<thead>
<tr>
<th onclick="sortBy('points')">#</th>
<th onclick="sortBy('name')">Nick</th>
<th onclick="sortBy('points')">Punkty</th>
<th onclick="sortBy('villages')">Wioski</th>
<th onclick="sortBy('tribe')">Plemie</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>

</div>

</div>

<script>
function toggle(){
  const s=document.getElementById("sidebar");
  s.classList.toggle("collapsed");
  localStorage.setItem("sidebar", s.classList.contains("collapsed"));
}

window.onload=()=>{
  if(localStorage.getItem("sidebar")==="true"){
    document.getElementById("sidebar").classList.add("collapsed");
  }
};

let data=[];
let sortKey="points";
let asc=false;

async function init(){
  const res=await fetch("/api/players");
  data=await res.json();
  render();
}

function sortBy(k){
  if(sortKey===k){ asc=!asc; } else { sortKey=k; asc=false; }
  render();
}

document.getElementById("search").addEventListener("input", render);

function render(){
  const q=document.getElementById("search").value.toLowerCase();

  let list=[...data]
  .filter(x=>x.name.toLowerCase().includes(q)||(x.tribe||"").toLowerCase().includes(q))
  .sort((a,b)=>{
    if(sortKey==="name"||sortKey==="tribe"){
      return asc ? a[sortKey].localeCompare(b[sortKey]) : b[sortKey].localeCompare(a[sortKey]);
    }
    return asc ? a[sortKey]-b[sortKey] : b[sortKey]-a[sortKey];
  });

  let i=1;

  document.getElementById("t").innerHTML =
  list.slice(0,300).map(x=>`
    <tr>
      <td>${i++}</td>
      <td>${x.name}</td>
      <td>${x.points}</td>
      <td>${x.villages}</td>
      <td onclick="go(${x.tribeId})" style="color:${x.color};cursor:pointer">${x.tribe}</td>
    </tr>
  `).join("");
}

function go(id){
  location.href="/tribe.html?id="+id;
}

init();
</script>

</body>
</html>
