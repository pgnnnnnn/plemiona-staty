<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Przyrosty</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container panel">

<h1>Przyrosty (24h)</h1>

<table>
<thead>
<tr>
<th>#</th>
<th>Plemie</th>
<th>Gain</th>
<th>Punkty</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>

<script>
async function load(){
  const res = await fetch("/api/gain");
  const data = await res.json();

  let i=1;

  document.getElementById("t").innerHTML =
  data.map(x=>`
    <tr>
      <td>${i++}</td>
      <td>${x.tag}</td>
      <td style="color:#4cff4c">+${x.gain}</td>
      <td>${x.points}</td>
    </tr>
  `).join("");
}

load();
</script>

</body>
</html>
