<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Plemiona</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">
  <div class="logo">STATY 224</div>
  <div>
    <a href="/">Home</a>
  </div>
</div>

<div class="container">

<div class="panel">

<h1>Ranking plemion</h1>

<input class="search" id="search" placeholder="Szukaj..." onkeyup="render()">

<table>
<thead>
<tr>
<th>#</th>
<th>Tag</th>
<th>Punkty</th>
<th>Wioski</th>
<th>Członkowie</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>

</div>

<script>
let data=[];

async function init(){
  const res = await fetch("/api/tribes");
  data = await res.json();
  render();
}

function render(){
  const q = document.getElementById("search").value.toLowerCase();
  let i = 1;

  document.getElementById("t").innerHTML =
  data.filter(x=>x.tag.toLowerCase().includes(q))
  .slice(0,300)
  .map(x=>`
    <tr onclick="go(${x.id})">
      <td>${i++}</td>
      <td>${x.tag}</td>
      <td>${x.points}</td>
      <td>${x.villages}</td>
      <td>${x.members}</td>
    </tr>
  `).join("");
}

function go(id){
  location.href="/tribe.html?id="+id;
}

init();
</script>

</body>
</html>
