<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plemiona</title>
<link rel="stylesheet" href="style.css">
<style>
.gold {background:#3a2f00;}
.silver {background:#2c2c2c;}
.bronze {background:#3a1f00;}
</style>
</head>
<body>

<div class="container panel">

<h1>Plemiona</h1>
<input id="search" placeholder="Szukaj...">

<table>
<thead>
<tr>
<th onclick="sortBy('points')">#</th>
<th onclick="sortBy('tag')">Tag</th>
<th onclick="sortBy('points')">Punkty</th>
<th onclick="sortBy('villages')">Wioski</th>
<th onclick="sortBy('members')">Członkowie</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>

<script>
let data=[];
let sortKey="points";

async function init(){
  const res=await fetch("/api/tribes");
  data=await res.json();
  render();
}

function sortBy(k){
  sortKey=k;
  render();
}

document.getElementById("search").addEventListener("input", render);

function render(){
  const q=document.getElementById("search").value.toLowerCase();

  let list=[...data]
  .filter(x=>x.tag.toLowerCase().includes(q))
  .sort((a,b)=> sortKey==="tag"
    ? a.tag.localeCompare(b.tag)
    : b[sortKey]-a[sortKey]);

  let i=1;

  document.getElementById("t").innerHTML =
  list.slice(0,200).map(x=>{
    let cls="";
    if(i===1) cls="gold";
    if(i===2) cls="silver";
    if(i===3) cls="bronze";

    return `
    <tr class="${cls}" onclick="openTribe(${x.id})">
      <td>${i++}</td>
      <td style="color:${x.color}">${x.tag}</td>
      <td>${x.points}</td>
      <td>${x.villages}</td>
      <td>${x.members}</td>
    </tr>`;
  }).join("");
}

function openTribe(id){
  location.href="/tribe.html?id="+id;
}

init();
</script>

</body>
</html>
