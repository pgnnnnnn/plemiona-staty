<!DOCTYPE html>
<html>
<head>
<title>Plemiona</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Ranking Plemion</h1>
<button onclick="update()">Aktualizuj</button>

<table id="t">
<thead>
<tr>
<th>#</th>
<th>Plemie</th>
<th>Punkty</th>
<th>Wioski</th>
<th>Członkowie</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
async function load(){
  const res = await fetch("/api/tribes");
  const data = await res.json();
  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  data.forEach(t=>{
    tbody.innerHTML += `
      <tr>
        <td>${t.rank}</td>
        <td>${t.name}</td>
        <td>${t.points}</td>
        <td>${t.villages}</td>
        <td>${t.members}</td>
      </tr>`;
  });
}

async function update(){
  await fetch("/update");
  load();
}

load();
</script>

</body>
</html>
