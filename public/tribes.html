<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plemiona</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container panel">

<h1>Plemiona</h1>
<button onclick="update()">Aktualizuj</button>

<table id="t">
<thead>
<tr>
<th>#</th>
<th>Nazwa</th>
<th>Punkty</th>
<th>Wioski</th>
<th>Członkowie</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>
async function load(){
  const r = await fetch("/api/tribes");
  const d = await r.json();
  const t = document.querySelector("#t tbody");
  t.innerHTML="";
  d.forEach(x=>{
    t.innerHTML += `<tr>
    <td>${x.rank}</td>
    <td>${x.name}</td>
    <td>${x.points}</td>
    <td>${x.villages}</td>
    <td>${x.members}</td>
    </tr>`;
  });
}
async function update(){
  await fetch("/update");
  load();
}
load();
</script>

</body>
</html>
