<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plemiona</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container panel">

<h1>Plemiona</h1>

<input id="search" placeholder="Szukaj...">

<table>
<thead>
<tr>
<th>#</th>
<th>Tag</th>
<th>Punkty</th>
<th>Wioski</th>
<th>Członkowie</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>

<script>
let data=[];

async function init(){
  const res=await fetch("/api/tribes");
  data=await res.json();
  render();
}

document.getElementById("search").addEventListener("input", render);

function render(){
  const q=document.getElementById("search").value.toLowerCase();

  let i=1;

  document.getElementById("t").innerHTML =
  data.filter(x=>x.tag.toLowerCase().includes(q))
  .slice(0,200)
  .map(x=>`
    <tr onclick="openTribe(${x.id})">
      <td>${i++}</td>
      <td style="color:${x.color}">${x.tag}</td>
      <td>${x.points}</td>
      <td>${x.villages}</td>
      <td>${x.members}</td>
    </tr>
  `).join("");
}

function openTribe(id){
  location.href="/tribe.html?id="+id;
}

init();
</script>

</body>
</html>
