<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Plemiona</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container panel">

<h1>Ranking Plemion</h1>

<input id="search" placeholder="Szukaj plemienia..." onkeyup="load()">

<table>
<thead>
<tr>
<th>#</th>
<th>Tag</th>
<th>Punkty</th>
<th>Wioski</th>
<th>Członkowie</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>

<script>
let data = [];

async function init(){
  const res = await fetch("/api/tribes");
  data = await res.json();
  load();
}

function load(){
  const q = document.getElementById("search").value.toLowerCase();
  let i = 1;

  document.getElementById("t").innerHTML =
  data
  .filter(x => x.tag.toLowerCase().includes(q))
  .slice(0,200)
  .map(x=>`
    <tr onclick="openTribe(${x.id})" style="cursor:pointer">
      <td>${i++}</td>
      <td>${x.tag}</td>
      <td>${x.points}</td>
      <td>${x.villages}</td>
      <td>${x.members}</td>
    </tr>
  `).join("");
}

function openTribe(id){
  window.location = "/tribe.html?id=" + id;
}

init();
</script>

</body>
</html>
