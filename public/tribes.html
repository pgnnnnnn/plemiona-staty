<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plemiona</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

<div class="sidebar" id="sidebar">
  <div class="toggle" onclick="toggle()">☰</div>
  <div class="logo">STATY</div>

  <div class="menu">
    <a href="/" data-tip="Dashboard">🏠 <span class="text">Dashboard</span></a>
    <a href="/players.html" data-tip="Gracze">👤 <span class="text">Gracze</span></a>
    <a href="/tribes.html" class="active" data-tip="Plemiona">⚔️ <span class="text">Plemiona</span></a>
  </div>
</div>

<div class="content">

<div class="panel">

<div class="back" onclick="history.back()">← Powrót</div>

<h1>Plemiona</h1>

<div id="timer" class="timer"></div>
<div class="refresh" onclick="manualRefresh()">↻ Odśwież teraz</div>

<input id="search" placeholder="Szukaj...">

<table>
<thead>
<tr>
<th onclick="sortBy('points')">#</th>
<th onclick="sortBy('tag')">Tag</th>
<th onclick="sortBy('points')">Punkty</th>
<th onclick="sortBy('villages')">Wioski</th>
<th onclick="sortBy('members')">Członkowie</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>

</div>

</div>

<script>
// sidebar
function toggle(){
  const s=document.getElementById("sidebar");
  s.classList.toggle("collapsed");
  localStorage.setItem("sidebar", s.classList.contains("collapsed"));
}

window.onload=()=>{
  if(localStorage.getItem("sidebar")==="true"){
    document.getElementById("sidebar").classList.add("collapsed");
  }
};

let data=[];
let sortKey="points";
let asc=false;

async function init(){
  const res=await fetch("/api/tribes");
  data=await res.json();
  render();
}

function sortBy(k){
  if(sortKey===k){asc=!asc;} else {sortKey=k;asc=false;}
  render();
}

document.getElementById("search").addEventListener("input", render);

function render(){
  const q=document.getElementById("search").value.toLowerCase();

  let list=[...data]
  .filter(x=>x.tag.toLowerCase().includes(q))
  .sort((a,b)=>{
    if(sortKey==="tag"){
      return asc?a.tag.localeCompare(b.tag):b.tag.localeCompare(a.tag);
    }
    return asc?a[sortKey]-b[sortKey]:b[sortKey]-a[sortKey];
  });

  let i=1;

  document.getElementById("t").innerHTML=
  list.slice(0,200).map(x=>`
    <tr onclick="go(${x.id})">
      <td>${i++}</td>
      <td style="color:${x.color}">${x.tag}</td>
      <td>${x.points}</td>
      <td>${x.villages}</td>
      <td>${x.members}</td>
    </tr>
  `).join("");
}

function go(id){
  location.href="/tribe.html?id="+id;
}

// live update
let refreshTime=300;
let current=refreshTime;

function startTimer(){
  setInterval(()=>{
    current--;
    document.getElementById("timer").innerText="Odświeżanie za: "+current+"s";

    if(current<=0){
      current=refreshTime;
      init();
    }
  },1000);
}

function manualRefresh(){
  current=refreshTime;
  init();
}

init();
startTimer();
</script>

</body>
</html>
