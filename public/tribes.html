<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plemiona</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container panel">

<h1>Ranking plemion</h1>

<input id="search" placeholder="Szukaj...">

<table>
<thead>
<tr>
<th>#</th>
<th>Tag</th>
<th>Punkty</th>
<th>Wioski</th>
<th>Członkowie</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>

<script>
let data=[];

async function init(){
  const res = await fetch("/tribes.json");
  data = await res.json();

  data.sort((a,b)=>b.points-a.points);

  render();
}

document.getElementById("search").addEventListener("input", render);

function render(){
  const q = document.getElementById("search").value.toLowerCase();

  let i=1;

  document.getElementById("t").innerHTML =
  data.filter(x => (x.tag||"").toLowerCase().includes(q))
  .slice(0,200)
  .map(x=>`
  <tr>
    <td>${i++}</td>
    <td>${x.tag}</td>
    <td>${x.points}</td>
    <td>${x.villages}</td>
    <td>${x.members}</td>
  </tr>`).join("");
}

init();
</script>

</body>
</html>
