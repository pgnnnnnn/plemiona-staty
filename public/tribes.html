<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plemiona</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container panel">
<h1>Ranking Plemion</h1>

<table>
<thead>
<tr>
<th>#</th>
<th>Tag</th>
<th>Punkty</th>
<th>Wioski</th>
<th>Członkowie</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>

<script>
async function load(){
  const res = await fetch("/api/tribes");
  const data = await res.json();

  let i = 1;
  document.getElementById("t").innerHTML = data.map(x=>`
    <tr>
      <td>${i++}</td>
      <td>${x.tag}</td>
      <td>${x.points}</td>
      <td>${x.villages}</td>
      <td>${x.members}</td>
    </tr>
  `).join("");
}

load();
</script>

</body>
</html>
