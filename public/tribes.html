<!DOCTYPE html>
<html>
<head>
<title>Top 25 Plemion</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Top 25 Plemion</h1>
<button onclick="update()">Aktualizuj</button>

<table>
<thead>
<tr>
<th>#</th>
<th>Plemie</th>
<th>Punkty</th>
<th>Wioski</th>
<th>Członkowie</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
async function load(){
  const res = await fetch("/api/tribes");
  const data = await res.json();
  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  data.forEach((t, index)=>{
    let color = "";
    if(index === 0) color = "gold";
    else if(index === 1) color = "silver";
    else if(index === 2) color = "orange";

    tbody.innerHTML += `
      <tr style="background-color:${color};">
        <td>${index+1}</td>
        <td>${t.name}</td>
        <td>${t.points}</td>
        <td>${t.villages}</td>
        <td>${t.members}</td>
      </tr>`;
  });
}

async function update(){
  await fetch("/update");
  load();
}

load();
</script>

</body>
</html>
