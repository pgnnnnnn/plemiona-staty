<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Profil gracza</title>
<link rel="stylesheet" href="style.css">

<style>
.card{
  background:#1a1a1a;
  padding:20px;
  border-radius:8px;
}
.big{font-size:26px;font-weight:bold;}
.stat{margin-top:10px;font-size:18px;}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="logo">STATY</div>
</div>

<div class="content">
<div class="panel">

<div class="card">
<div id="name" class="big"></div>
<div id="tribe" class="stat"></div>
<div id="points" class="stat"></div>
<div id="villages" class="stat"></div>
</div>

</div>
</div>

</div>

<script>
function getId(){
  return new URL(window.location.href).searchParams.get("id");
}

async function load(){
  const res=await fetch("/api/player/"+getId());
  const p=await res.json();

  document.getElementById("name").innerText=p.name;
  document.getElementById("tribe").innerHTML="Plemie: <span style='color:"+p.color+"'>"+p.tribe+"</span>";
  document.getElementById("points").innerText="Punkty: "+p.points.toLocaleString();
  document.getElementById("villages").innerText="Wioski: "+p.villages;
}

load();
</script>

</body>
</html>
